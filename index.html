<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI代理操作テスト</title>
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.6;
      margin: 40px auto;
      max-width: 720px;
      padding: 0 16px;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 24px;
    }
    .button {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      border: 1px solid #222;
      border-radius: 6px;
      text-decoration: none;
      color: #000;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>申請テスト</h1>
      <p>これは AI の代理操作を試すためのサンプルサイトです。</p>

      <h2>手続きの流れ</h2>
      <ol>
        <li>申請フォームに必要事項を入力する</li>
        <li>確認画面で内容を確認する</li>
        <li>送信して完了する</li>
      </ol>

      <h2>注意事項</h2>
      <ul>
        <li>申請者氏名、生年月日、住所は必須です。</li>
        <li>確認画面で内容を確認してから送信してください。</li>
      </ul>

      <a class="button" href="./form.html">申請を開始する</a>
    </div>
  </main>
</body>
</html>
