<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>送信完了</title>
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.6;
      margin: 40px auto;
      max-width: 720px;
      padding: 0 16px;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 24px;
    }
    a.button {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 20px;
      border: 1px solid #222;
      border-radius: 6px;
      text-decoration: none;
      color: #000;
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>送信が完了しました</h1>
      <p>申請の送信が完了しました。</p>
      <a class="button" href="./index.html">トップへ戻る</a>
    </div>
  </main>

  <script>
    sessionStorage.removeItem('application_name');
    sessionStorage.removeItem('application_birthdate');
    sessionStorage.removeItem('application_address');
    sessionStorage.removeItem('application_phone');
  </script>
</body>
</html>
